<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #ffeb3b, #f44336, #2196f3);
      color: #333;
    }

    .overlay {
      background-color: rgba(255, 192, 203, 0.9);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }

    h1 {
      font-size: 2.8em;
      margin-bottom: 20px;
      color: #b71c1c;
    }

    p {
      font-size: 1.1em;
      max-width: 720px;
      margin-bottom: 25px;
      color: #333;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    button {
      padding: 12px 20px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #d32f2f;
      color: white;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #b71c1c;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Family</h1>
    <p>Welcome to our Family website — a place to share love, memories, and togetherness.</p>
    <div class="button-container">
      <button onclick="goToUnderstanding()">Go to Understanding</button>
      <button onclick="addContent()">Add</button>
      <button onclick="rateSite()">Rate</button>
      <button onclick="openMovies()">Movies</button>
      <button onclick="createQuiz()">Create Quiz</button>
      <button onclick="openSocial()">Social</button>
    </div>
  </div>

  <script>
    function goToUnderstanding() {
      window.location.href = 'understanding.html';
    }
    function addContent() {
      window.location.href = 'add.html';
    }
    function rateSite() {
      alert('Rate this family website...');
    }
    function openMovies() {
      window.location.href = 'movies.html';
    }
    function createQuiz() {
      window.location.href = 'createquiz.html';
    }
    function openSocial() {
      window.location.href = 'social.html';
    }
  </script>
</body>
</html>
