<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffeb3b, #f44336, #2196f3);
      margin: 0;
      padding: 0;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: rgba(255, 255, 255, 0.92);
      color: #b71c1c;
      padding: 30px 20px;
      text-align: center;
      border-radius: 18px;
      margin: 30px auto 20px;
      max-width: 960px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }
    .container {
      max-width: 960px;
      margin: 20px auto 40px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.14);
    }
    .question-card { margin-bottom: 24px; }
    .question-card h3 { margin-bottom: 12px; }
    .option-row { margin-bottom: 10px; }
    .option-row label { cursor: pointer; }
    button { padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; background-color: #d32f2f; color: white; transition: background-color 0.2s ease; }
    button:hover { background-color: #b71c1c; }
    .message { margin-top: 20px; padding: 14px; border-radius: 12px; background: #e8f6ff; color: #1f3a64; }
    .back-link { display: inline-block; margin-top: 18px; color: #b71c1c; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1 id="quizTitleHeader">Take Quiz</h1>
  </header>
  <div class="container">
    <div id="quizForm">Loading quiz...</div>
    <div id="resultMessage" class="message" style="display:none;"></div>
    <a class="back-link" href="social.html">Back to Social Wall</a>
  </div>

  <script>
    function getQuizId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    function showResult(correct, total) {
      const result = document.getElementById('resultMessage');
      result.style.display = 'block';
      result.textContent = `You answered ${correct} out of ${total} questions correctly.`;
    }

    function renderQuiz(quiz) {
      const form = document.createElement('div');
      const title = document.getElementById('quizTitleHeader');
      title.textContent = quiz.title;

      quiz.questions.forEach((question, qIndex) => {
        const card = document.createElement('div');
        card.className = 'question-card';

        const heading = document.createElement('h3');
        heading.textContent = `Q${qIndex + 1}: ${question.question}`;
        card.appendChild(heading);

        question.options.forEach((option, oIndex) => {
          const optionRow = document.createElement('div');
          optionRow.className = 'option-row';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'answer-' + qIndex;
          input.value = oIndex;
          input.id = `q${qIndex}-opt${oIndex}`;

          const label = document.createElement('label');
          label.htmlFor = input.id;
          label.textContent = option;

          optionRow.appendChild(input);
          optionRow.appendChild(label);
          card.appendChild(optionRow);
        });

        form.appendChild(card);
      });

      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = 'Submit Answers';
      button.onclick = () => submitQuizAttempt(quiz.id, quiz.questions.length);
      form.appendChild(button);

      const container = document.getElementById('quizForm');
      container.innerHTML = '';
      container.appendChild(form);
    }

    function submitQuizAttempt(quizId, questionCount) {
      const answers = [];
      for (let i = 0; i < questionCount; i += 1) {
        const selected = document.querySelector(`input[name="answer-${i}"]:checked`);
        answers.push(selected ? Number(selected.value) : null);
      }

      const apiUrl = window.location.origin + '/api/quizzes/' + quizId + '/attempt';
      fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          showResult(data.correct, data.total);
        } else {
          alert(data.error || 'Unable to grade quiz.');
        }
      })
      .catch(error => {
        console.error(error);
        alert('Failed to submit your answers. Make sure the server is running.');
      });
    }

    function loadQuiz() {
      const quizId = getQuizId();
      const container = document.getElementById('quizForm');
      if (!quizId) {
        container.textContent = 'Quiz ID missing. Open the quiz from the Social page.';
        return;
      }
      const apiUrl = window.location.origin + '/api/quizzes/' + quizId;
      fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            container.textContent = data.error;
          } else {
            renderQuiz(data);
          }
        })
        .catch(error => {
          console.error(error);
          container.textContent = 'Unable to load quiz. Make sure the server is running.';
        });
    }

    loadQuiz();
  </script>
</body>
</html>
